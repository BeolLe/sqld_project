apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sqld-backend-route
  namespace: app
spec:
  parentRefs:
    - name: sqld-gateway
      namespace: envoy-gateway-system
  hostnames:
    - test_dummies.selfronny.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: sqld-backend
          port: 8000
