apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sqld-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/BeolLe/sqld_project
    targetRevision: main
    path: infra/gateway/base
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
