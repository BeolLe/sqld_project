apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sqld-project
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<형님계정>/sqld_project
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
